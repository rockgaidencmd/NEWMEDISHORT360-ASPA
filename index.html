<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MEDISHORT360 - Regla del Aspa</title>
    <meta name="description" content="Calculadora de diluciones IV - Metodo de Aligacion." />
    <meta name="theme-color" content="#c8a614" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ASPA 360" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icono-192.png" />
    <link rel="apple-touch-icon" href="./icono-192.png" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet" />

    <!-- ================== PANTALLA DE ACTIVACION (estilos) ================== -->
    <style>
      #aspa-gate {
        position: fixed;
        inset: 0;
        z-index: 999999;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          radial-gradient(120% 90% at 50% -10%, #150020 0%, #101830 45%, #0a1020 100%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #f0f4ff;
        transition: opacity .45s ease;
      }
      #aspa-gate.hidden { display: none; }

      .aspa-gate-card {
        width: 100%;
        max-width: 380px;
        background: linear-gradient(135deg, #101830, #150020);
        border: 1px solid #c8a61444;
        border-radius: 22px;
        padding: 30px 24px 26px;
        box-shadow: 0 0 40px #c8a61422, 0 18px 50px rgba(0,0,0,.55);
        text-align: center;
      }

      .aspa-logo {
        width: 88px; height: 88px;
        border-radius: 50%;
        object-fit: cover;
        margin: 0 auto 14px;
        display: block;
        border: 2px solid #c8a614;
        box-shadow: 0 0 22px #c8a61455;
      }
      .aspa-gate-brand {
        font-size: 12px; letter-spacing: 2px; font-weight: 700;
        color: #c8a614; text-transform: uppercase; margin-bottom: 4px;
      }
      .aspa-gate-title {
        font-size: 21px; font-weight: 800; color: #f0f4ff; margin: 2px 0 6px;
      }
      .aspa-gate-sub {
        font-size: 13px; color: #7a8aac; line-height: 1.5; margin-bottom: 22px;
      }

      .aspa-input-row {
        display: flex; align-items: center;
        border: 1.5px solid #4ea6dc;
        background: #0c1428;
        border-radius: 12px;
        padding: 2px 6px 2px 14px;
        box-shadow: 0 0 14px #4ea6dc33;
        transition: box-shadow .2s, border-color .2s;
      }
      .aspa-input-row:focus-within {
        border-color: #4ea6dc;
        box-shadow: 0 0 22px #4ea6dc66;
      }
      .aspa-input-row input {
        flex: 1; min-width: 0;
        background: transparent; border: none; outline: none;
        color: #f0f4ff;
        font-size: 18px; letter-spacing: 3px; font-weight: 600;
        text-align: center;
        font-family: "DM Mono", ui-monospace, monospace;
        padding: 13px 6px;
        text-transform: uppercase;
      }
      .aspa-input-row input::placeholder {
        color: #45557a; letter-spacing: 2px; font-weight: 400;
      }

      .aspa-btn {
        width: 100%; margin-top: 16px;
        padding: 14px;
        border: none; border-radius: 12px; cursor: pointer;
        background: linear-gradient(135deg, #c8a614, #b8920f);
        color: #150020;
        font-size: 15px; font-weight: 800; letter-spacing: .5px;
        box-shadow: 0 0 18px #c8a61455;
        transition: transform .12s, box-shadow .2s, opacity .2s;
      }
      .aspa-btn:active { transform: scale(.98); }
      .aspa-btn:disabled { opacity: .55; cursor: progress; }

      .aspa-msg {
        min-height: 18px; margin-top: 14px;
        font-size: 13px; font-weight: 600;
      }
      .aspa-msg.error { color: #ff6b81; }
      .aspa-msg.ok    { color: #4ea6dc; }

      .aspa-gate-footer {
        margin-top: 20px; font-size: 11px; color: #45557a; line-height: 1.5;
      }
    </style>

    <!-- ================== ACCESO · estilos premium (lujo clínico) ================== -->
    <style>
      #aspa-gate{
        --oro:#c8a614; --oro-claro:#e7c63f; --azul:#4ea6dc;
        --tinta:#f0f4ff; --tenue:#8a9ac0; --dim:#55648c; --linea:#1e2d50;
        --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
        --serif:"Fraunces",Georgia,"Times New Roman",serif;
        --mono:"DM Mono",ui-monospace,SFMono-Regular,monospace;
        overflow:hidden;
      }
      /* Motivo de fondo: el "aspa" (X) latiendo, guiño al nombre de la app */
      #aspa-gate::before{
        content:""; position:absolute; inset:-25%; pointer-events:none; z-index:0;
        background:
          linear-gradient(58deg, transparent 49.3%, rgba(200,166,20,.11) 49.7%, rgba(200,166,20,.11) 50.3%, transparent 50.7%),
          linear-gradient(-58deg, transparent 49.3%, rgba(78,166,220,.09) 49.7%, rgba(78,166,220,.09) 50.3%, transparent 50.7%);
        animation:aspaLatido 7s ease-in-out infinite;
      }
      /* Grano sutil para dar textura */
      #aspa-gate::after{
        content:""; position:absolute; inset:0; pointer-events:none; z-index:0;
        background-image:radial-gradient(rgba(255,255,255,.022) 1px, transparent 1px);
        background-size:3px 3px;
      }
      @keyframes aspaLatido{0%,100%{opacity:.45;transform:scale(1)}50%{opacity:.95;transform:scale(1.05)}}

      .aspa-gate-card{
        position:relative; z-index:1;
        max-width:420px !important;
        background:linear-gradient(160deg,#13182f,#171026) !important;
        border:1px solid rgba(200,166,20,.22) !important;
        border-radius:26px !important;
        padding:34px 26px 26px !important;
        box-shadow:0 0 0 1px rgba(255,255,255,.02), 0 30px 70px rgba(0,0,0,.6), 0 0 50px rgba(200,166,20,.10) !important;
        animation:gateIn .6s cubic-bezier(.2,.7,.2,1) both;
        overflow:hidden;
      }
      .aspa-gate-card::before{ /* hairline dorada superior */
        content:""; position:absolute; top:0; left:18%; right:18%; height:1px;
        background:linear-gradient(90deg,transparent,var(--oro),transparent); opacity:.7;
      }
      @keyframes gateIn{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
      @keyframes subeFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
      @keyframes giro{to{transform:rotate(360deg)}}

      .gate-logo-wrap{position:relative;width:92px;height:92px;margin:0 auto 16px}
      .gate-logo{width:92px;height:92px;border-radius:50%;object-fit:cover;display:block;position:relative;z-index:1;border:2px solid rgba(200,166,20,.5)}
      .gate-logo-ring{position:absolute;inset:-7px;border-radius:50%;
        background:conic-gradient(from 0deg, transparent, var(--oro), transparent 62%);
        -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 2px));
        mask:radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 2px));
        animation:giro 4.5s linear infinite}

      .gate-eyebrow{font:700 11px/1 var(--sans);letter-spacing:3px;text-transform:uppercase;color:var(--oro);text-align:center;margin-bottom:14px}
      .gate-display{font:600 30px/1.05 var(--serif);color:var(--tinta);letter-spacing:-.5px;text-align:center;margin:0 0 8px;animation:subeFade .6s .05s both}
      .gate-sub2{font:400 13.5px/1.55 var(--sans);color:var(--tenue);text-align:center;margin:0 auto 22px;max-width:32ch;animation:subeFade .6s .12s both}

      .gate-field{display:flex;align-items:center;gap:10px;padding:0 14px;background:rgba(10,16,34,.85);
        border:1.5px solid var(--linea);border-radius:14px;transition:border-color .2s, box-shadow .2s;animation:subeFade .6s .18s both}
      .gate-field:focus-within{border-color:var(--azul);box-shadow:0 0 0 4px rgba(78,166,220,.14)}
      .gate-field-icon{width:18px;height:18px;color:var(--dim);flex:none}
      .gate-field input{flex:1;min-width:0;background:transparent;border:none;outline:none;color:var(--tinta);font:500 15px/1 var(--sans);letter-spacing:.3px;padding:15px 0}
      .gate-field input::placeholder{color:var(--dim)}

      .gate-btn{position:relative;width:100%;margin-top:16px;padding:15px;border:none;border-radius:14px;cursor:pointer;
        font:700 15px/1 var(--sans);letter-spacing:.3px;color:#1a1205;overflow:hidden;
        background:linear-gradient(135deg,var(--oro-claro),var(--oro));box-shadow:0 8px 24px rgba(200,166,20,.28);
        transition:transform .12s, box-shadow .2s, filter .2s;animation:subeFade .6s .24s both}
      .gate-btn:hover{filter:brightness(1.06)}
      .gate-btn:active{transform:translateY(1px) scale(.99)}
      .gate-btn::after{content:"";position:absolute;top:0;left:-60%;width:40%;height:100%;
        background:linear-gradient(100deg,transparent,rgba(255,255,255,.55),transparent);transform:skewX(-20deg);animation:brillo 3.8s ease-in-out infinite}
      @keyframes brillo{0%,62%{left:-60%}100%{left:135%}}
      .gate-btn[disabled]{opacity:.6;cursor:progress}
      .gate-btn[disabled]::after{display:none}

      .gate-msg{min-height:18px;margin-top:14px;text-align:center;font:600 13px/1.4 var(--sans)}
      .gate-msg.error{color:#ff7a8c}
      .gate-msg.ok{color:var(--azul)}

      .gate-trust{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:18px;font:500 11px/1.4 var(--sans);color:var(--dim);text-align:center}
      .gate-trust svg{width:13px;height:13px;flex:none}

      .plan-grid{display:grid;gap:12px;margin-top:4px;animation:subeFade .6s .18s both}
      .plan-card{position:relative;display:flex;flex-direction:column;align-items:flex-start;gap:2px;
        padding:16px 16px 15px;border-radius:16px;cursor:pointer;text-align:left;
        background:rgba(10,16,34,.7);border:1.5px solid var(--linea);color:var(--tinta);
        transition:transform .14s, border-color .2s, box-shadow .2s}
      .plan-card:hover{transform:translateY(-2px);border-color:#2b3d66}
      .plan-card:active{transform:translateY(0)}
      .plan-card.featured{border-color:rgba(200,166,20,.55);
        background:linear-gradient(160deg, rgba(200,166,20,.10), rgba(10,16,34,.7));box-shadow:0 10px 30px rgba(200,166,20,.12)}
      .plan-card.featured:hover{box-shadow:0 14px 36px rgba(200,166,20,.2)}
      .plan-badge{position:absolute;top:-9px;right:14px;padding:3px 9px;border-radius:999px;
        font:700 9.5px/1 var(--sans);letter-spacing:.6px;text-transform:uppercase;color:#1a1205;
        background:linear-gradient(135deg,var(--oro-claro),var(--oro));box-shadow:0 4px 12px rgba(200,166,20,.35)}
      .plan-name{font:600 12px/1 var(--sans);letter-spacing:1.5px;text-transform:uppercase;color:var(--tenue)}
      .plan-price{font:500 30px/1 var(--mono);color:var(--tinta);margin-top:3px}
      .plan-card.featured .plan-price{color:var(--oro-claro)}
      .plan-period{font:500 13px/1 var(--mono);color:var(--tenue);margin-left:2px}
      .plan-note{font:400 12px/1.3 var(--sans);color:var(--dim);margin-top:4px}
      .plan-card.cargando{opacity:.55;pointer-events:none}

      .gate-spinner{width:42px;height:42px;margin:8px auto 18px;border-radius:50%;border:3px solid rgba(200,166,20,.2);border-top-color:var(--oro);animation:giro 1s linear infinite}
      .gate-state-icon{width:54px;height:54px;margin:6px auto 16px;display:grid;place-items:center;border-radius:50%;background:rgba(78,166,220,.12);color:var(--azul)}
      .gate-state-icon svg{width:28px;height:28px}

      @media (prefers-reduced-motion:reduce){
        #aspa-gate::before,.gate-logo-ring,.gate-btn::after,.gate-spinner,
        .aspa-gate-card,.gate-display,.gate-sub2,.gate-field,.gate-btn,.plan-grid{animation:none}
      }
    </style>
  </head>
  <body>
    <!-- ============ PUERTA DE ACTIVACION ============ -->
    <div id="aspa-gate">
      <div class="aspa-gate-card">
        <img src="./icono-192.png" alt="MEDISHORT360" class="aspa-logo" />
        <div class="aspa-gate-brand">MEDISHORT360 · ASPA</div>
        <div class="aspa-gate-title">Activación</div>
        <div class="aspa-gate-sub">Ingresa tu código único para desbloquear la calculadora.</div>

        <div class="aspa-input-row">
          <input id="aspa-codigo" type="text" inputmode="text"
                 placeholder="CÓDIGO" autocomplete="off"
                 autocapitalize="characters" spellcheck="false" maxlength="40" />
        </div>

        <button id="aspa-activar" class="aspa-btn">Activar</button>
        <div id="aspa-msg" class="aspa-msg"></div>

        <div class="aspa-gate-footer">Solo necesitas activar una vez en este dispositivo.</div>
      </div>
    </div>

    <div id="particles"></div>
    <div id="root">
      <div class="app">
        <div id="z-header"></div>
        <div id="z-form"></div>
        <div id="z-result"></div>
      </div>
    </div>
    <button id="install-btn" onclick="handleInstall()">🩺 Instalar app</button>
    <script src="./app.js"></script>
    <!-- Lógica de activación con Firebase (módulo, no toca app.js) -->
    <script type="module" src="./activacion.js"></script>
  </body>
</html>
